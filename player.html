<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Movie - StreamVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col">

    <header class="bg-gray-800 shadow-md sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-red-500 tracking-wider cursor-pointer" onclick="window.location.href='index.html'">STREAM<span class="text-white">VERSE</span></h1>
    </header>

    <main class="flex-grow p-4 max-w-4xl mx-auto w-full flex flex-col justify-center">
        <div class="space-y-4 w-full">
            
            <div class="aspect-video w-full bg-black rounded-xl overflow-hidden shadow-2xl">
                <iframe id="video-player" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <h2 id="player-movie-title" class="text-2xl font-bold mt-4 px-1 text-center sm:text-left">Movie Title</h2>
        </div>
    </main>

    <footer class="bg-gray-800 text-center py-4 text-xs text-gray-500 border-t border-gray-700">
        &copy; 2026 StreamVerse. All rights reserved.
    </footer>

    <script src="app.js"></script>
    <script>
        // Player page initialization
        initPlayerPage();
    </script>
</body>
</html>
