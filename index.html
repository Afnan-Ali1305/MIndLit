<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - Watch Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col">

    <header class="bg-gray-800 shadow-md sticky top-0 z-50 px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3">
        <h1 class="text-2xl font-bold text-red-500 tracking-wider cursor-pointer" onclick="window.location.href='index.html'">STREAM<span class="text-white">VERSE</span></h1>
        
        <div class="w-full sm:w-72">
            <input type="text" id="search-input" placeholder="Search movies..." class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
        </div>
    </header>

    <main class="flex-grow p-4 max-w-7xl mx-auto w-full">
        <div id="home-view" class="space-y-6">
            <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>

            <div id="pagination" class="flex items-center justify-center space-x-4 py-6">
                <button id="prev-btn" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded disabled:opacity-50 disabled:cursor-not-allowed transition text-sm font-semibold">
                    &larr; Previous
                </button>
                <span id="page-number" class="text-gray-400 text-sm">Page 1</span>
                <button id="next-btn" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded disabled:opacity-50 disabled:cursor-not-allowed transition text-sm font-semibold">
                    Next &rarr;
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-center py-4 text-xs text-gray-500 border-t border-gray-700">
        &copy; 2026 StreamVerse. All rights reserved.
    </footer>

    <script src="app.js"></script>
    <script>
        // Index page initialization
        initIndexPage();
    </script>
</body>
</html>
